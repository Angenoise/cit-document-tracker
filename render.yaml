services:
  - type: web
    name: cit-document-tracker-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn document_tracker.wsgi:application
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: cit-document-tracker-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-vercel-app.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-vercel-app.vercel.app
      - key: DB_NAME
        fromDatabase:
          name: cit-document-tracker-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: cit-document-tracker-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cit-document-tracker-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: cit-document-tracker-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cit-document-tracker-db
          property: port

databases:
  - name: cit-document-tracker-db
    plan: free