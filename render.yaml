services:
  - type: web
    name: cit-document-tracker-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && pip install django==5.0.2 && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn document_tracker.wsgi:application
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: cit-document-tracker.onrender.com,cit-document-tracker-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://cit-document-tracker-front.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://cit-document-tracker-front.onrender.com
      - key: DATABASE_URL
        sync: false